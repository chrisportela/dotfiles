name: Nix

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}

      - uses: cachix/cachix-action@v16
        with:
          name: chrisportela-dotfiles

      - name: Check flake
        run: nix flake check --all-systems

  build:
    name: Build (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}

      - uses: cachix/cachix-action@v16
        with:
          name: chrisportela-dotfiles

      - name: Build packages and devShells
        run: |
          nix build \
            .#packages.x86_64-linux.cachix-helper \
            .#packages.x86_64-linux.setup-envrc \
            .#packages.x86_64-linux.claude-code \
            .#formatter.x86_64-linux \
            .#devShells.x86_64-linux.dotfiles \
            .#devShells.x86_64-linux.dev \
            .#devShells.x86_64-linux.devops \
            --no-link

      - name: Build home-manager
        run: nix build .#legacyPackages.x86_64-linux.homeConfigurations.cmp.activationPackage --no-link

      - name: Eval NixOS config (ada)
        run: nix eval .#nixosConfigurations.ada.config.system.build.toplevel

  build-darwin:
    name: Build (Darwin)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v6

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
            extra-allowed-impure-host-deps = /Library/Apple/System

      - uses: cachix/cachix-action@v16
        with:
          name: chrisportela-dotfiles

      - name: Build devShells
        run: |
          nix build \
            .#packages.aarch64-darwin.cliclick \
            .#packages.aarch64-darwin.claude-code \
            .#packages.aarch64-darwin.peekaboo \
            .#packages.aarch64-darwin.swift6 \
            .#devShells.aarch64-darwin.default \
            .#devShells.aarch64-darwin.dev \
            .#devShells.aarch64-darwin.devops \
            --no-link

      - name: Eval darwin config (lux)
        run: nix eval .#darwinConfigurations.lux.config.system.build.toplevel

      - name: Eval darwin config (roxy)
        run: nix eval .#darwinConfigurations.roxy.config.system.build.toplevel
